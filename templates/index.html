<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoice Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --radius: 8px;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            line-height: 1.5;
            padding: 2rem;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }

        .form-section {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            height: fit-content;
        }

        .preview-section {
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            height: calc(100vh - 4rem);
            position: sticky;
            top: 2rem;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            color: var(--text-main);
        }

        h2 {
            font-size: 1.1rem;
            margin: 1.5rem 0 1rem;
            color: var(--text-main);
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.5rem;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: var(--text-main);
        }

        input, textarea {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-family: inherit;
            font-size: 0.875rem;
            transition: border-color 0.15s ease;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: var(--radius);
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.15s ease;
            font-size: 0.875rem;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        .btn-outline {
            background-color: transparent;
            color: var(--primary);
            border: 1px solid var(--primary);
        }

        .btn-outline:hover {
            background-color: rgba(37, 99, 235, 0.05);
        }

        .btn-danger {
            background-color: transparent;
            color: #ef4444;
            border: 1px solid #ef4444;
            padding: 0.5rem 1rem;
        }

        .btn-danger:hover {
            background-color: rgba(239, 68, 68, 0.05);
        }

        .item-row {
            background: var(--bg);
            padding: 1rem;
            border-radius: var(--radius);
            margin-bottom: 1rem;
            position: relative;
        }

        .remove-item {
            position: absolute;
            top: 1rem;
            right: 1rem;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .preview-header {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .container {
                grid-template-columns: 1fr;
            }
            .preview-section {
                height: 800px;
                position: static;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="form-section">
        <h1>Generate Invoice</h1>
        <form id="invoiceForm">
            <!-- General Info -->
            <div class="grid-2">
                <div class="form-group">
                    <label>Invoice No</label>
                    <input type="text" name="invoice_no" placeholder="e.g. 1001" required>
                </div>
                <div class="form-group">
                    <label>Invoice Date</label>
                    <input type="text" name="invoice_date" placeholder="DD-MM-YYYY" required>
                </div>
            </div>

            <!-- Company Info -->
            <h2>Your Company Details</h2>
            <div class="form-group">
                <label>Company Name</label>
                <input type="text" name="company_name" required>
            </div>
            <div class="form-group">
                <label>Company Address (Multiline)</label>
                <textarea name="company_address" rows="3"></textarea>
            </div>
            <div class="grid-2">
                <div class="form-group">
                    <label>Phone</label>
                    <input type="text" name="company_phone">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="company_email">
                </div>
                <div class="form-group">
                    <label>GSTIN</label>
                    <input type="text" name="company_gstin">
                </div>
            </div>

            <!-- Bill To -->
            <h2>Bill To</h2>
            <div class="form-group">
                <label>Client Name</label>
                <input type="text" name="bill_to_name" required>
            </div>
            <div class="form-group">
                <label>Client Address (Multiline)</label>
                <textarea name="bill_to_address" rows="3"></textarea>
            </div>
            <div class="form-group">
                <label>Client GSTIN</label>
                <input type="text" name="bill_to_gstin">
            </div>

            <!-- Ship To -->
            <h2>Ship To (Optional)</h2>
            <div class="form-group">
                <label>Ship To Name</label>
                <input type="text" name="ship_to_name">
            </div>
            <div class="form-group">
                <label>Ship To Address (Multiline)</label>
                <textarea name="ship_to_address" rows="3"></textarea>
            </div>
            <div class="form-group">
                <label>Ship To GSTIN</label>
                <input type="text" name="ship_to_gstin">
            </div>

            <!-- Items -->
            <h2>Items</h2>
            <div id="itemsContainer">
                <!-- Items will be added here dynamically -->
            </div>
            <button type="button" class="btn-outline" onclick="addItem()">+ Add Item</button>

            <!-- Bank Details -->
            <h2>Bank Details</h2>
            <div class="grid-2">
                <div class="form-group">
                    <label>Account Name</label>
                    <input type="text" name="bank_acc_name">
                </div>
                <div class="form-group">
                    <label>Account No</label>
                    <input type="text" name="bank_acc_no">
                </div>
                <div class="form-group">
                    <label>Account Type</label>
                    <input type="text" name="bank_acc_type" placeholder="e.g. Current">
                </div>
                <div class="form-group">
                    <label>Bank Name</label>
                    <input type="text" name="bank_name">
                </div>
                <div class="form-group">
                    <label>Branch</label>
                    <input type="text" name="bank_branch">
                </div>
                <div class="form-group">
                    <label>IFSC Code</label>
                    <input type="text" name="bank_ifsc">
                </div>
            </div>

            <!-- Notes -->
            <h2>Notes</h2>
            <div class="form-group">
                <label>Additional Notes (Multiline)</label>
                <textarea name="notes" rows="3">Thanks for your business.</textarea>
            </div>

            <div style="margin-top: 2rem;">
                <button type="submit" style="width: 100%; font-size: 1rem;">Generate PDF Preview</button>
            </div>
        </form>
    </div>

    <div class="preview-section">
        <div class="preview-header">
            <h2 style="margin: 0; border: none; padding: 0;">PDF Preview</h2>
            <button id="downloadBtn" style="display: none;" onclick="downloadPDF()">Download PDF</button>
        </div>
        <iframe id="pdfPreview" src="about:blank"></iframe>
    </div>
</div>

<script>
    let itemCounter = 0;
    let currentPdfUrl = null;

    function addItem() {
        const container = document.getElementById('itemsContainer');
        const id = itemCounter++;
        
        const html = `
            <div class="item-row" id="item-${id}">
                <button type="button" class="btn-danger remove-item" onclick="removeItem(${id})" ${id === 0 ? 'style="display:none;"' : ''}>X</button>
                <div class="form-group">
                    <label>Item Name</label>
                    <input type="text" name="item_name[]" required>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <input type="text" name="item_desc[]">
                </div>
                <div class="grid-2">
                    <div class="form-group">
                        <label>HSN</label>
                        <input type="text" name="item_hsn[]">
                    </div>
                    <div class="form-group">
                        <label>Qty</label>
                        <input type="number" step="0.01" name="item_qty[]" value="1" required>
                    </div>
                    <div class="form-group">
                        <label>Rate</label>
                        <input type="number" step="0.01" name="item_rate[]" required>
                    </div>
                    <div class="form-group">
                        <label>CGST %</label>
                        <input type="number" step="0.01" name="item_cgst[]" value="0">
                    </div>
                    <div class="form-group">
                        <label>SGST %</label>
                        <input type="number" step="0.01" name="item_sgst[]" value="0">
                    </div>
                </div>
            </div>
        `;
        container.insertAdjacentHTML('beforeend', html);
    }

    function removeItem(id) {
        document.getElementById(`item-${id}`).remove();
    }

    // Add initial item
    addItem();

    document.getElementById('invoiceForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        // Collect form data
        const formData = new FormData(e.target);
        const data = Object.fromEntries(formData.entries());
        
        // Structure items correctly
        const names = formData.getAll('item_name[]');
        const descs = formData.getAll('item_desc[]');
        const hsns = formData.getAll('item_hsn[]');
        const qtys = formData.getAll('item_qty[]');
        const rates = formData.getAll('item_rate[]');
        const cgsts = formData.getAll('item_cgst[]');
        const sgsts = formData.getAll('item_sgst[]');
        
        data.items = names.map((name, i) => ({
            name: name,
            description: descs[i],
            hsn: hsns[i],
            qty: qtys[i],
            rate: rates[i],
            cgst_pct: cgsts[i],
            sgst_pct: sgsts[i]
        }));

        try {
            const submitBtn = e.target.querySelector('button[type="submit"]');
            const originalText = submitBtn.innerText;
            submitBtn.innerText = 'Generating...';
            submitBtn.disabled = true;

            const response = await fetch('/generate', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(data)
            });

            submitBtn.innerText = originalText;
            submitBtn.disabled = false;

            if (!response.ok) throw new Error('Generation failed');

            const blob = await response.blob();
            
            // Cleanup previous URL if exists
            if (currentPdfUrl) {
                URL.revokeObjectURL(currentPdfUrl);
            }

            currentPdfUrl = URL.createObjectURL(blob);
            document.getElementById('pdfPreview').src = currentPdfUrl;
            document.getElementById('downloadBtn').style.display = 'block';

        } catch (error) {
            alert('Error generating invoice: ' + error.message);
        }
    });

    function downloadPDF() {
        if (!currentPdfUrl) return;
        const a = document.createElement('a');
        a.href = currentPdfUrl;
        
        // Use form value or default
        const invoiceNo = document.querySelector('input[name="invoice_no"]').value || 'invoice';
        a.download = `Invoice_${invoiceNo}.pdf`;
        
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
    }
</script>

</body>
</html>
